services:
  - type: web
    name: projectair
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python setup_database.py
    startCommand: cd frontend && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: flight_db.sqlite
